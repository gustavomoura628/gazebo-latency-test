services:
  gazebo-latency-test:
    build: .
    container_name: gazebo-latency-test

    # Only X11-specific vars (passed from host)
    # App config (TURTLEBOT3_MODEL, ROS_*, GAZEBO_MODEL_PATH) is in Dockerfile
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=/tmp/.Xauthority

    volumes:
      # X11 socket for GUI
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # X11 auth
      - ${XAUTHORITY:-$HOME/.Xauthority}:/tmp/.Xauthority:ro
      # For integrated GPU access (Gazebo rendering)
      - /dev/dri:/dev/dri

    # Network mode host for easy port access
    network_mode: host

    # Allow GUI apps
    privileged: true

    # Interactive terminal
    stdin_open: true
    tty: true

    # NVIDIA GPU pass-through for Phase 2b depth mode.
    # Requires nvidia-container-toolkit on the host (sudo apt install nvidia-container-toolkit).
    # If you don't have an NVIDIA GPU or nvidia-container-toolkit, comment this block out;
    # the depth checkbox will then fall back to flat-plane Phase 2a automatically.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
