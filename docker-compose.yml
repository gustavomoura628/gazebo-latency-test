services:
  gazebo-latency-test:
    build: .
    container_name: gazebo-latency-test

    # X11 forwarding for Gazebo and pygame windows
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=/tmp/.Xauthority
      - TURTLEBOT3_MODEL=waffle_pi
      - ROS_LOCALHOST_ONLY=1
      - ROS_DOMAIN_ID=0

    volumes:
      # X11 socket for GUI
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # X11 auth
      - ${XAUTHORITY:-$HOME/.Xauthority}:/tmp/.Xauthority:ro
      # For GPU access (if available)
      - /dev/dri:/dev/dri

    # Network mode host for easy port access
    network_mode: host

    # Allow GUI apps
    privileged: true

    # Interactive terminal
    stdin_open: true
    tty: true
