services:
  gazebo-latency-test:
    build: .
    container_name: gazebo-latency-test

    # Only X11-specific vars (passed from host)
    # App config (TURTLEBOT3_MODEL, ROS_*, GAZEBO_MODEL_PATH) is in Dockerfile
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=/tmp/.Xauthority

    volumes:
      # X11 socket for GUI
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # X11 auth
      - ${XAUTHORITY:-$HOME/.Xauthority}:/tmp/.Xauthority:ro
      # For GPU access (if available)
      - /dev/dri:/dev/dri

    # Network mode host for easy port access
    network_mode: host

    # Allow GUI apps
    privileged: true

    # Interactive terminal
    stdin_open: true
    tty: true
